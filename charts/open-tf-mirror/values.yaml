global:
  imageRegistry: ""
  imagePullSecrets: []
  storageClass: ""

nameOverride: ""
fullnameOverride: ""
namespaceOverride: ""

commonAnnotations: {}
commonLabels: {}

openTfMirror:
  replicas: 1

  image:
    repository: peanutchou/open-tf-mirror
    tag: 0.2.0
    pullPolicy: IfNotPresent

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
    fsGroup: 10001
    fsGroupChangePolicy: OnRootMismatch
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

  command:
    - open-tf-mirror

  args:
    - --log-debug
    - --log-verbosity=4

  env: []
  envFrom: []

  resources: {}

  startupProbe:
    initialDelaySeconds: 0
    timeoutSeconds: 1
    periodSeconds: 5
    failureThreshold: 10
    successThreshold: 1

  readinessProbe:
    enabled: true
    timeoutSeconds: 5
    periodSeconds: 5
    failureThreshold: 3
    successThreshold: 1

  livenessProbe:
    enabled: true
    timeoutSeconds: 5
    periodSeconds: 5
    failureThreshold: 10
    successThreshold: 1

  pdb:
    enabled: true
    minAvailable: 1
    maxUnavailable: 0

  service:
    enabled: true
    type: ClusterIP
    ports:
      http: 80
      https: 443
    targetPorts:
      http: 8080
      https: 8443
    sessionAffinity: ClientIP
    sessionAffinityConfig: {}

  pvc:
    enabled: true
    subPath: ""
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    size: 1Gi

  tls:
    enabled: false
    domainName: ""
    secretName: ""

  providersMirror:
    enabled: true
    image:
      repository: sealio/terraform-deployer
      tag: v1.5.7-seal.1
      pullPolicy: IfNotPresent
